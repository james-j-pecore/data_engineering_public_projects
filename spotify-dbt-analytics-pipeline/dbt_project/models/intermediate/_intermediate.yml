version: 2

models:
  - name: int_track_artist_album
    description: One row per (track, artist), enriched with album and artist metadata.
    columns:
      - name: track_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_spotify__tracks')
                field: track_id
      - name: artist_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_spotify__artists')
                field: artist_id

  - name: int_playlist_tracks_enriched
    description: One row per (playlist, track), joined to playlist and primary-artist/album metadata.
    columns:
      - name: playlist_track_id
        tests:
          - unique
          - not_null
      - name: playlist_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_spotify__playlists')
                field: playlist_id
